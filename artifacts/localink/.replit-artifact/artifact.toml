kind = "web"
previewPath = "/"
title = "LocaLink"
version = "1.0.0"
id = "artifacts/localink"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21335

[services.development]
run = "pnpm --filter @workspace/localink run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/localink", "run", "build" ]
serve = "static"
publicDir = "artifacts/localink/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21335"
BASE_PATH = "/"
